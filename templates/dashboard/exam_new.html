{% extends "base.html" %}
{% block title %}New Exam · PlagCheck{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto w-full px-6 py-8">
  <nav class="flex items-center gap-2 text-xs text-slate-400 font-semibold uppercase tracking-wider mb-5">
    <a href="/dashboard/" class="hover:text-primary transition-colors">Dashboard</a>
    <span class="material-symbols-outlined" style="font-size:14px">chevron_right</span>
    <span class="text-slate-700">New Exam</span>
  </nav>

  <div class="mb-6">
    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Lecturer Portal</p>
    <h1 class="text-2xl font-extrabold tracking-tight">Create Exam</h1>
  </div>

  {% if error %}
  <div class="mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-3">
    {{ error }}
  </div>
  {% endif %}

  <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
    <form method="post" action="/dashboard/exams/new" class="space-y-5">
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-1">Course</label>
        <select name="course_id" required
                class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
          <option value="" disabled {% if not preselect_course %}selected{% endif %}>Select course…</option>
          {% for course in courses %}
          <option value="{{ course.id }}" {% if preselect_course == course.id %}selected{% endif %}>{{ course.code }} · {{ course.title }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-1">Exam title</label>
        <input type="text" name="title" required
               class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
               placeholder="e.g. Midterm Essay">
      </div>

      <div>
        <label class="block text-sm font-bold text-slate-700 mb-1">Description <span class="font-normal text-slate-400">(optional)</span></label>
        <textarea name="description" rows="3"
                  class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary resize-none"
                  placeholder="Submission instructions for students…"></textarea>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">Opens at</label>
          <input type="datetime-local" name="opens_at" required
                 class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">Closes at</label>
          <input type="datetime-local" name="closes_at" required
                 class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
        </div>
      </div>

      <div class="grid grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">Allowed formats</label>
          <input type="text" name="allowed_formats" value="pdf,docx,txt" required
                 class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">Max file size (MB)</label>
          <input type="number" min="1" max="100" name="max_file_mb" value="10" required
                 class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-1">Similarity threshold</label>
          <input type="number" min="0" max="1" step="0.05" name="similarity_threshold" value="0.4" required
                 class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
        </div>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit"
                class="flex-1 py-2.5 bg-primary hover:bg-primary/90 text-white rounded-lg font-bold text-sm flex items-center justify-center gap-2 transition-all shadow-lg shadow-primary/20">
          <span class="material-symbols-outlined" style="font-size:18px">add_circle</span>
          Create exam
        </button>
        <a href="/dashboard/"
           class="px-5 py-2.5 rounded-lg border border-slate-200 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
